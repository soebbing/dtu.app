name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      db:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16.2'
          otp-version: '26.2.2'

      - name: Cache Elixir Dependencies & Build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install Elixir Dependencies
        run: mix deps.get

      - name: Check Code Formatting
        run: mix format --check-formatted

      - name: Compile Application (Warnings as Errors)
        run: mix compile --warnings-as-errors
        env:
          MIX_ENV: test

      - name: Run ExUnit Tests
        run: mix test
        env:
          MIX_ENV: test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Node.js Dependencies
        run: npm ci

      - name: Install Playwright Chromium with System Dependencies
        run: npx playwright install --with-deps chromium

      - name: Compile Production Assets
        run: mix assets.deploy
        env:
          MIX_ENV: prod
          DATABASE_URL: ecto://postgres:postgres@localhost:5432/dtu_app_prod
          SECRET_KEY_BASE: dummy_secret_key_base_at_least_64_bytes_long_for_production_server
          MQTT_BROKER_ENABLED: "false"

      - name: Setup & Seed E2E Database
        run: |
          mix ecto.create
          mix ecto.migrate
          mix run priv/repo/seeds.exs
        env:
          MIX_ENV: prod
          DATABASE_URL: ecto://postgres:postgres@localhost:5432/dtu_app_prod
          SECRET_KEY_BASE: dummy_secret_key_base_at_least_64_bytes_long_for_production_server
          MQTT_BROKER_ENABLED: "false"

      - name: Start Phoenix Server
        run: |
          PORT=4000 mix phx.server > phx.log 2>&1 &
        env:
          MIX_ENV: prod
          PHX_SERVER: "true"
          DATABASE_URL: ecto://postgres:postgres@localhost:5432/dtu_app_prod
          SECRET_KEY_BASE: dummy_secret_key_base_at_least_64_bytes_long_for_production_server
          MQTT_BROKER_ENABLED: "false"

      - name: Wait for Phoenix Server
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:4000 > /dev/null; do sleep 1; done'

      - name: Print Phoenix Server Startup Log on Wait Timeout
        if: failure()
        run: cat phx.log || true

      - name: Run Playwright E2E Tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Print Phoenix Server Logs on Failure
        if: failure()
        run: cat phx.log || true

      - name: Upload Playwright Report on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
