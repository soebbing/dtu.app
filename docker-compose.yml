# Local development only.
# In production the app container joins the existing Traefik network and
# TimescaleDB runs as its own container/managed instance. See the project plan.
services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dtu_app_dev
    ports:
      - "5432:5432"
    volumes:
      - dtu_app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dtu_app_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dtu_app_pgdata:
