<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="dtu.app logo">
  <!-- Rounded brand tile. The mark reads on light and dark backgrounds. -->
  <defs>
    <linearGradient id="dtuTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="dtuSun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>

  <rect x="1.5" y="1.5" width="45" height="45" rx="12" fill="url(#dtuTile)" />

  <!-- Sun: a disc with short rays, upper-left of the tile -->
  <g fill="url(#dtuSun)">
    <circle cx="17" cy="17" r="6.2" />
  </g>
  <g stroke="url(#dtuSun)" stroke-width="2.1" stroke-linecap="round">
    <line x1="17" y1="5.4" x2="17" y2="8.2" />
    <line x1="5.4" y1="17" x2="8.2" y2="17" />
    <line x1="8.9" y1="8.9" x2="10.9" y2="10.9" />
    <line x1="25.1" y1="8.9" x2="23.1" y2="10.9" />
    <line x1="8.9" y1="25.1" x2="10.9" y2="23.1" />
  </g>

  <!-- Power generation curve: a solar arc echoing the dashboard charts -->
  <path
    d="M6 38 Q12 24 19 23 T31 22 Q37 21 42 14"
    fill="none"
    stroke="#ffffff"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.95"
  />
  <!-- Soft filled area under the curve for weight at small sizes -->
  <path
    d="M6 38 Q12 24 19 23 T31 22 Q37 21 42 14 L42 42 L6 42 Z"
    fill="#ffffff"
    opacity="0.12"
  />
</svg>
