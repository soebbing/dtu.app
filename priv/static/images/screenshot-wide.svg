<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient matching app theme -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emeraldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <!-- Header/Navbar simulation -->
  <rect x="0" y="0" width="1280" height="64" fill="#ffffff" opacity="0.1"/>

  <!-- Logo placeholder -->
  <circle cx="40" cy="32" r="16" fill="url(#emeraldGradient)"/>
  <text x="70" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#10b981">dtu.app</text>

  <!-- Nav items -->
  <text x="200" y="38" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Dashboard</text>
  <text x="300" y="38" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">DTUs</text>

  <!-- User info -->
  <circle cx="1220" cy="32" r="12" fill="#374151"/>
  <text x="1180" y="38" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">user@example.com</text>

  <!-- Main content area -->
  <g transform="translate(40, 100)">
    <!-- Page title -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">PV Power Dashboard</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="16" fill="#9ca3af">Real-time solar generation monitoring</text>

    <!-- Stat cards row -->
    <g transform="translate(0, 60)">
      <!-- Card 1: Current Power -->
      <rect x="0" y="0" width="280" height="120" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Current Generation</text>
      <text x="20" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#10b981">2,847 W</text>
      <text x="20" y="100" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Peak: 3,420 W</text>

      <!-- Card 2: Today's Yield -->
      <rect x="300" y="0" width="280" height="120" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="320" y="30" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Today's Yield</text>
      <text x="320" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#10b981">18.4 kWh</text>
      <text x="320" y="100" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Target: 25 kWh</text>

      <!-- Card 3: Peak Power -->
      <rect x="600" y="0" width="280" height="120" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="620" y="30" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Peak Power Today</text>
      <text x="620" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#f59e0b">3,420 W</text>
      <text x="620" y="100" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">at 1:45 PM</text>

      <!-- Card 4: Efficiency -->
      <rect x="900" y="0" width="280" height="120" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="920" y="30" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Efficiency Today</text>
      <text x="920" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#10b981">94.2%</text>
      <text x="920" y="100" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">+2.1% vs yesterday</text>
    </g>

    <!-- Chart area -->
    <g transform="translate(0, 210)">
      <rect x="0" y="0" width="1200" height="280" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>

      <!-- Chart title -->
      <text x="20" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Today's Production Curve</text>
      <text x="20" y="55" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Hourly power generation</text>

      <!-- Chart area visualization -->
      <g transform="translate(40, 100)">
        <!-- Grid lines -->
        <line x1="0" y1="0" x2="1120" y2="0" stroke="#374151" stroke-width="1"/>
        <line x1="0" y1="50" x2="1120" y2="50" stroke="#374151" stroke-width="1" stroke-dasharray="5,5"/>
        <line x1="0" y1="100" x2="1120" y2="100" stroke="#374151" stroke-width="1" stroke-dasharray="5,5"/>
        <line x1="0" y1="150" x2="1120" y2="150" stroke="#374151" stroke-width="1" stroke-dasharray="5,5"/>

        <!-- Production curve -->
        <path d="M 0,150 Q 50,140 100,120 T 200,80 T 300,60 T 400,30 T 500,20 T 600,30 T 700,50 T 800,80 T 900,110 T 1000,140 T 1120,150"
              fill="none" stroke="url(#emeraldGradient)" stroke-width="3" stroke-linecap="round"/>

        <!-- Area under curve -->
        <path d="M 0,150 Q 50,140 100,120 T 200,80 T 300,60 T 400,30 T 500,20 T 600,30 T 700,50 T 800,80 T 900,110 T 1000,140 T 1120,150 L 1120,150 L 0,150 Z"
              fill="url(#emeraldGradient)" opacity="0.2"/>

        <!-- Peak indicator -->
        <circle cx="500" cy="20" r="6" fill="#f59e0b"/>
        <text x="500" y="5" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">Peak: 3,420W</text>

        <!-- Time labels -->
        <text x="0" y="170" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">6:00</text>
        <text x="200" y="170" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">9:00</text>
        <text x="400" y="170" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">12:00</text>
        <text x="600" y="170" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">15:00</text>
        <text x="800" y="170" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">18:00</text>
        <text x="1000" y="170" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">21:00</text>
        <text x="1120" y="170" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="end">Current</text>
      </g>
    </g>
  </g>

  <!-- Bottom status bar -->
  <rect x="0" y="688" width="1280" height="32" fill="#10b981" opacity="0.1"/>
  <text x="40" y="710" font-family="Arial, sans-serif" font-size="12" fill="#10b981">● Live updates enabled</text>
  <text x="1240" y="710" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="end">Last sync: Just now</text>
</svg>