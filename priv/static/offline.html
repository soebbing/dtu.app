<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're Offline - dtu.app</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1a1a1a;
    }

    .container {
      max-width: 480px;
      width: 100%;
    }

    .offline-card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-container {
      width: 120px;
      height: 120px;
      margin: 0 auto 25px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    .wifi-icon {
      width: 60px;
      height: 60px;
      position: relative;
    }

    .wifi-icon::before,
    .wifi-icon::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .wifi-icon::before {
      width: 20px;
      height: 20px;
      bottom: 10px;
      left: 20px;
    }

    .wifi-icon::after {
      width: 30px;
      height: 30px;
      top: 5px;
      left: 15px;
      border: 3px solid #f87171;
      background: transparent;
    }

    .status-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      border: 2px solid #f59e0b;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 30px;
    }

    .feature {
      background: #f9fafb;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #e5e7eb;
    }

    .feature-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .feature-text {
      font-size: 13px;
      color: #6b7280;
      font-weight: 500;
    }

    .retry-button {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
      margin-bottom: 15px;
    }

    .retry-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    .connection-status {
      font-size: 14px;
      color: #9ca3af;
      margin-top: 20px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #10b981 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 25px;
    }

    @media (max-width: 480px) {
      .offline-card {
        padding: 30px 20px;
      }

      h1 {
        font-size: 24px;
      }

      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="offline-card">
      <div class="icon-container">
        <div class="wifi-icon"></div>
      </div>

      <div class="status-badge">⚠️ Connection Lost</div>

      <h1>You're Offline</h1>

      <p class="subtitle">
        Don't worry! Your solar data is safe. We'll reconnect automatically when your internet returns.
      </p>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">📊</div>
          <div class="feature-text">View Cached Data</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🔄</div>
          <div class="feature-text">Auto Reconnect</div>
        </div>
        <div class="feature">
          <div class="feature-icon">☀️</div>
          <div class="feature-text">Solar Monitoring</div>
        </div>
        <div class="feature">
          <div class="feature-icon">📱</div>
          <div class="feature-text">PWA Ready</div>
        </div>
      </div>

      <button class="retry-button" onclick="window.location.reload()">
        🔄 Try Reconnecting
      </button>

      <div class="connection-status">
        <span class="status-dot"></span>
        Checking connection...
      </div>

      <div class="logo">dtu.app</div>
    </div>
  </div>

  <script>
    // Auto-retry connection every 5 seconds
    let retryCount = 0
    const maxRetries = 12 // Try for 1 minute (12 * 5 seconds)

    function checkConnection() {
      if (navigator.onLine) {
        // If we detect we're back online, reload the page
        window.location.reload()
      } else {
        retryCount++
        if (retryCount < maxRetries) {
          setTimeout(checkConnection, 5000)
        } else {
          document.querySelector('.connection-status').innerHTML =
            '<span class="status-dot" style="background: #f59e0b; animation: none;"></span> Still offline - will retry when connection detected'
        }
      }
    }

    // Listen for online event
    window.addEventListener('online', () => {
      document.querySelector('.connection-status').innerHTML =
        '<span class="status-dot" style="background: #10b981; animation: none;"></span> Connection restored! Reloading...'
      setTimeout(() => window.location.reload(), 1000)
    })

    // Start checking connection
    setTimeout(checkConnection, 5000)

    // Update status text based on retries
    setInterval(() => {
      if (retryCount < maxRetries) {
        const timeLeft = ((maxRetries - retryCount) * 5).toString()
        document.querySelector('.connection-status').innerHTML =
          '<span class="status-dot"></span> Checking connection... (retrying in ' + timeLeft + 's)'
      }
    }, 1000)
  </script>
</body>
</html>
